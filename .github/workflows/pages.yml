name: Pages

# Deploys the public showcase to GitHub Pages:
#   /                → site/            (landing + live system/banking/wallet references)
#   /configurator/   → apps/configurator (the brandprint / hash-preset maker)
# No external secrets needed — Pages deploy uses the built-in GITHUB_TOKEN.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build the libraries the docs site renders
        run: pnpm -r --filter "@neptune.fintech/tokens" --filter "@neptune.fintech/web-ui" --filter "@neptune.fintech/icons" run build
      - name: Bundle components + icons for the docs pages (site/assets/neptune.js)
        run: node site/bundle/build.mjs
      - name: Build the configurator
        run: pnpm --filter "@neptune.fintech/configurator" run build
      - name: Assemble _site (static reference site + configurator)
        run: |
          rm -rf _site
          mkdir -p _site
          cp -r site/* _site/
          mkdir -p _site/configurator
          cp -r apps/configurator/dist/* _site/configurator/
          # Pages must not run Jekyll over our assets
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
