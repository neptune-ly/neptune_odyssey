name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  js:
    name: JS/TS — build, test, typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm -r --filter "./packages/**" --filter "./apps/**" run build
      - name: Test all packages
        run: pnpm -r --filter "./packages/**" --filter "./apps/**" run test

  flutter:
    name: Flutter — analyze + test (golden)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.4
          channel: stable
      - working-directory: packages/neptune_flutter_ui
        run: flutter pub get
      - name: Analyze
        working-directory: packages/neptune_flutter_ui
        run: flutter analyze
      - name: Golden tests
        working-directory: packages/neptune_flutter_ui
        run: flutter test

  no-literals:
    name: P2 gate — no literal colour/radius/font in components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Flutter widgets
        run: |
          ! grep -rnE 'Color\(0x|Colors\.|BorderRadius\.circular\([0-9]' \
            packages/neptune_flutter_ui/lib/src/widgets
      - name: Web components (no hex / oklch literals in component CSS)
        run: |
          ! grep -rnE '#[0-9a-fA-F]{6}|oklch\(' \
            packages/neptune_web_ui/src/components
