name: neptune_flutter_ui
version: 2.5.1
description: >-
  Neptune Odyssey Flutter UI — the vendor-neutral, white-label banking design
  system by Neptune.Fintech. Deterministic brandprints, Material 3 themes,
  and themed widgets for the four reference brands and any custom seed.
homepage: https://neptune.ly
repository: https://github.com/neptune-ly/neptune_odyssey

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
